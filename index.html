    <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

    body, p, h1, h2, h3, h4, h5, h6, span:not(.swiper-pagination-bullet):not(.count):not(.count_item_cart):not(.count_item_heater),
    a, input, button, select, label, li, td, th, div {
      font-family: 'Tajawal', sans-serif !important;
    }

    :root { --green: #004f49; --green-light: #e8f5f4; --green-mid: #006b63; }

    body { background: #f0f4f3; }

    /* ===== Header ===== */
    header { background: #fff !important; box-shadow: 0 2px 16px rgba(0,79,73,0.10) !important; }

    header .top_headar .logo { width: 60px !important; }
    header .top_headar .logo img { border-radius: 10px; }

    header .top_headar .search_box {
      background: #f9fffe !important;
      border: 2px solid #c8e6e4 !important;
      border-radius: 50px !important;
      overflow: hidden;
      height: 48px !important;
      display: flex !important;
      align-items: stretch !important;
    }
    header .top_headar .search_box input {
      height: 48px !important;
      background: transparent !important;
      border: none !important;
      padding: 0 18px !important;
      font-size: 14px !important;
      flex: 1 !important;
    }
    header .top_headar .search_box button {
      height: 48px !important;
      width: 56px !important;
      min-width: 56px !important;
      background: var(--green) !important;
      border-radius: 0 50px 50px 0 !important;
      font-size: 16px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    header .top_headar .search_box button i { color: #fff !important; font-family: "Font Awesome 6 Free" !important; }

    header .top_headar .header_icons .icon i {
      font-size: 26px !important;
      color: var(--green) !important;
      font-family: "Font Awesome 6 Free" !important;
    }
    header .top_headar .header_icons .icon .count {
      background: var(--green) !important;
      color: #fff !important;
      font-size: 12px !important;
      width: 22px !important; height: 22px !important;
      line-height: 22px !important;
      border-radius: 50% !important;
      top: -6px !important; right: -6px !important;
    }

    header .bottom_header { border-top: 1px solid #e0eeec !important; }
    header .bottom_header .nav_linkc li a { color: #333 !important; font-weight: 500; transition: color 0.2s; }
    header .bottom_header .nav_linkc li:hover a,
    header .bottom_header .nav_linkc li.active a { color: var(--green) !important; font-weight: 700; }
    header .bottom_header .open_menu i {
      color: var(--green) !important;
      font-family: "Font Awesome 6 Free" !important;
    }

    /* ===== Slider ===== */
    .slider .slied-swp { border-radius: 16px; overflow: hidden; box-shadow: 0 6px 24px rgba(0,79,73,0.12); }
    .slider .slied-swp .swiper-slide img { object-fit: cover; max-height: 420px; }
    .slider .banner_2 { border-radius: 14px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
    .swiper-pagination-bullet-active { background: var(--green) !important; }

    /* ===== Warning ===== */
    .payment-warning .warning-box {
      background: #fffdf0 !important;
      border: 2px solid #e6b800 !important;
      border-radius: 14px !important;
      padding: 14px 20px !important;
      display: flex; align-items: center; gap: 14px;
    }
    .payment-warning .warning-icon i { color: #e6b800 !important; font-size: 26px; font-family: "Font Awesome 6 Free" !important; }
    .payment-warning .warning-content h3 { color: #7a5c00 !important; font-size: 15px; margin-bottom: 3px; }
    .payment-warning .warning-content p { color: #5a4400 !important; font-size: 12px; margin: 2px 0; }

    /* ===== Products title ===== */
    .tpo_slide { border-bottom: 3px solid var(--green) !important; }
    .tpo_slide h2 {
      background: var(--green) !important;
      color: #fff !important;
      border-radius: 8px 8px 0 0 !important;
      font-size: 16px !important;
      padding: 10px 28px !important;
    }
    .tpo_slide h2 i { color: #fff !important; font-family: "Font Awesome 6 Free" !important; }

    /* ===== Product cards ===== */
    .product {
      border-radius: 14px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07) !important;
      border: 1px solid #e0eeec !important;
      transition: transform 0.22s, box-shadow 0.22s !important;
      overflow: hidden;
    }
    .product:hover { transform: translateY(-5px) !important; box-shadow: 0 12px 32px rgba(0,79,73,0.14) !important; }
    .product:hover .img_product { scale: 1.05 !important; }
    .product .img_product { height: 180px !important; }
    .product .name_product { font-size: 14px !important; color: #222 !important; }
    .price p { color: var(--green) !important; font-weight: 800 !important; }
    .stars i { color: var(--green) !important; font-family: "Font Awesome 6 Free" !important; }

    .product .icons .btn_add_cart {
      background: var(--green) !important;
      border-radius: 8px !important;
      font-size: 13px !important;
      padding: 9px 14px !important;
      font-weight: 700 !important;
      border: none !important;
    }
    .product .icons .btn_add_cart:hover { background: var(--green-mid) !important; scale: 1 !important; transform: translateY(-1px); }
    .product .icons .btn_add_cart i { color: #fff !important; font-family: "Font Awesome 6 Free" !important; }
    .product .icons .icon_product { border-radius: 8px !important; border: 1px solid #e0eeec !important; }
    .product .icons .icon_product:hover { background: var(--green) !important; }
    .product .icons .icon_product i { font-family: "Font Awesome 6 Free" !important; }

    /* ===== Cart ===== */
    .cart { border-radius: 16px 0 0 16px !important; box-shadow: -6px 0 30px rgba(0,0,0,0.13) !important; }
    .cart .top_cart { background: var(--green) !important; border-radius: 16px 0 0 0 !important; padding: 16px 20px !important; }
    .cart .top_cart h3 { color: #fff !important; }
    .cart .top_cart .close_cart i { color: #fff !important; font-family: "Font Awesome 6 Free" !important; }
    .cart .bottom_cart .price_cart_total { color: var(--green) !important; font-weight: 800 !important; }
    .cart .bottom_cart .botton_cart .btn_cart { border-radius: 8px !important; font-weight: 700 !important; }
    .cart .items_in_cart .item_cart .delete_item i { font-family: "Font Awesome 6 Free" !important; }

    /* ===== Banners ===== */
    .banners .banners_boxs .box { border-radius: 14px !important; overflow: hidden; transition: transform 0.22s; box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
    .banners .banners_boxs .box:hover { transform: scale(1.015); }
    .banners .banners_boxs .box img { border-radius: 14px; }

    /* ===== Footer ===== */
    footer { background: var(--green) !important; border-radius: 20px 20px 0 0; margin-top: 30px; }
    footer .container .big_row { width: 100% !important; display: flex; flex-direction: column; align-items: center; text-align: center; }
    footer .container .big_row .logo_footer { width: 70px !important; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); }
    footer .container .big_row p { color: rgba(255,255,255,0.85) !important; font-size: 16px !important; }
    footer .container .big_row .icon_footer a {
      background: rgba(255,255,255,0.15) !important;
      border-radius: 50% !important;
      border: 1px solid rgba(255,255,255,0.25) !important;
      transition: all 0.22s;
    }
    footer .container .big_row .icon_footer a:hover { background: rgba(255,255,255,0.3) !important; top: -3px !important; }
    footer .container .big_row .icon_footer a i { color: #fff !important; font-family: "Font Awesome 6 Brands", "Font Awesome 6 Free" !important; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .slider .slied-swp .swiper-slide img { max-height: 200px; }
      .payment-warning .warning-box { flex-direction: column; text-align: center; }
      footer { border-radius: 14px 14px 0 0; }
    }
    </style>
